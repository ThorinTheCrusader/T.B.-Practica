<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Peasant's Book</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>

    <header>
        <div class="header-inner">

            <a href="../html/index.html" class="logo">
                <span>☩</span>
                <div class="logo-text">
                    <span>Peasant's Book</span>
                    <span>A Medieval Codex</span>
                </div>
            </a>

            <nav>
                <a href="../html/browse.html">Browse</a>
                <a href="../html/timeline.html">Timeline</a>
                <a href="../html/categories.html">Categories</a>
                <a href="../html/about.html">About</a>
                <a href="../html/register.html">Register</a>
                <a href="../html/login.html">Login</a>
            </nav>

            <div class="nav-search">
                <input type="text" placeholder="Search the codex…">
                <button>Search</button>
            </div>

        </div>
    </header>

    <main class="auth-main">

        <div class="auth-box">

            <div class="auth-header">
                <span>☩</span>
                <h1>Join the Codex</h1>
                <p>Create your account to begin.</p>
            </div>

            <form id="register-form">

                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="ex: Smith">
                </div>

                <div class="form-group">
                    <label for="surname">Surname</label>
                    <input type="text" id="surname" placeholder="ex: John">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="ex: something@email.com">
                </div>

                <div class="form-group">
                    <label for="phone">Phone</label>
                    <div class="phone-input">
                        <select id="country">
                            <option value="" data-prefix="">🌍</option>
                            <option value="RO" data-prefix="40">🇷🇴 +40</option>
                            <option value="US" data-prefix="1">🇺🇸 +1</option>
                            <option value="GB" data-prefix="44">🇬🇧 +44</option>
                            <option value="DE" data-prefix="49">🇩🇪 +49</option>
                            <option value="FR" data-prefix="33">🇫🇷 +33</option>
                            <option value="IT" data-prefix="39">🇮🇹 +39</option>
                            <option value="ES" data-prefix="34">🇪🇸 +34</option>
                            <option value="MD" data-prefix="373">🇲🇩 +373</option>
                        </select>
                        <input type="text" id="phone" placeholder="71345678">
                    </div>
                </div>

                <div class="form-group">
                    <label for="pass">Password</label>
                    <input type="password" id="pass" placeholder="min. 8 characters">
                </div>

                <div class="form-group">
                    <label for="confirm">Confirm Password</label>
                    <input type="password" id="confirm">
                </div>

                <div id="error-msg" class="error-msg"></div>
                <div id="success-msg" class="success-msg"></div>

                <button type="submit" class="auth-btn">Register</button>

                <p class="auth-switch">Already have an account? <a href="../html/login.html">Login</a></p>

            </form>

        </div>

    </main>

    <footer>

        <div class="footer-inner">

            <div class="footer-brand">
                <span>☩</span>
                <p>Peasant's Book</p>
                <p>A medieval codex for the common reader.</p>
            </div>

            <nav class="footer-nav">
                <a href="../html/browse.html">Browse</a>
                <a href="../html/timeline.html">Timeline</a>
                <a href="../html/categories.html">Categories</a>
                <a href="../html/about.html">About</a>
            </nav>

            <p class="footer-copy">© 2026 Peasant's Book</p>

        </div>

    </footer>

    <script src="../JavaScript/register.js"></script>
</body>
</html>
