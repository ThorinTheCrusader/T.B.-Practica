<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Peasant's Book</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <header>
        <div class="header-inner">
            <a href="../html/index.html" class="logo">
                <span>☩</span>
                <div class="logo-text">
                    <span>Peasant's Book</span>
                    <span>A Medieval Codex</span>
                </div>
            </a>
            <nav>
                <a href="../html/browse.html">Browse</a>
                <a href="../html/timeline.html">Timeline</a>
                <a href="../html/categories.html">Categories</a>
                <a href="../html/about.html">About</a>
                <a href="../html/register.html">Register</a>
                <a href="../html/login.html">Login</a>
            </nav>
            <div class="nav-search">
                <input type="text" placeholder="Search the codex…">
                <button>Search</button>
            </div>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-box">

            <div class="auth-header">
                <span>☩</span>
                <h1>Welcome Back</h1>
                <p>Enter the codex once more.</p>
            </div>

            <form id="login-form">

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="ex: something@email.com">
                </div>

                <div class="form-group">
                    <label for="pass">Password</label>
                    <input type="password" id="pass" placeholder="Your password">
                </div>

                <div id="error-msg" class="error-msg"></div>
                <div id="success-msg" class="success-msg"></div>

                <button type="submit" class="auth-btn">Login</button>

                <p class="auth-switch">Don't have an account? <a href="../html/register.html">Register</a></p>

            </form>

        </div>
    </main>

    <footer>
        <div class="footer-inner">
            <div class="footer-brand">
                <span>☩</span>
                <p>Peasant's Book</p>
                <p>A medieval codex for the common reader.</p>
            </div>
            <nav class="footer-nav">
                <a href="../html/browse.html">Browse</a>
                <a href="../html/timeline.html">Timeline</a>
                <a href="../html/categories.html">Categories</a>
                <a href="../html/about.html">About</a>
            </nav>
            <p class="footer-copy">© 2026 Peasant's Book</p>
        </div>
    </footer>

    <script src="../JavaScript/login.js"></script>
</body>
</html>
